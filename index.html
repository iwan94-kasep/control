<html>
<head>
  <title>Login Customer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 25px;
      width: 90%;
      max-width: 400px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    /* HP kecil */
    @media (max-width: 480px) {
      .login-box {
        padding: 18px;
        border-radius: 10px;
      }

      input, button {
        font-size: 15px;
        padding: 11px;
      }
    }

    /* Tablet */
    @media (min-width: 481px) and (max-width: 1024px) {
      .login-box {
        max-width: 450px;
      }
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Login</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>

<script>
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("https://nodejs-production-fea7.up.railway.app/login", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ username, password })
});

  const data = await res.json();

  if (data.success) {
    localStorage.setItem("user", JSON.stringify(data.user));
    alert("Login berhasil!");
    window.location.href = "https://nodejs-production-fea7.up.railway.app/login/user.html";
  } else {
    alert(data.message);
  }
}
</script>

</body>
</html>
